version: "3.9"

services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: tabgroup9-openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-root@example.com}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:-ChangeMe123!}
      ZO_DATA_DIR: /data
    volumes:
      - openobserve-data:/data

volumes:
  openobserve-data:
    name: tabgroup9-openobserve-data
